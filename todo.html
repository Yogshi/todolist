<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-do List</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Jersey+20&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body class="todo-page">
  <div class="todo-bg">
    <img src="inspo.jpg" alt="Background" class="bg-image">
  </div>
  
  <div class="date-display" id="dateDisplay"></div>
  
  <div class="tabs-container">
    <div class="tabs" id="tabs">
      <button class="tab active" data-category="all" onclick="playClickSound(); switchTab('all')">
        <span class="tab-symbol">📋</span>
        <span class="tab-name">All</span>
      </button>
    </div>
  </div>
  
  <div class="todo-container">
    <button class="add-task-btn" onclick="playClickSound(); openPopup()">+ Add Task</button>
    
    <div class="tasks-container" id="tasksContainer">
      <p class="no-tasks-message" id="noTasksMessage">No tasks yet. Add your first task!</p>
    </div>
  </div>
  
  <div class="popup-overlay" id="popupOverlay">
    <div class="popup-box">
      <div class="popup-header">
        <h2>New Task</h2>
        <button class="close-popup" onclick="playClickSound(); closePopup()">✕</button>
      </div>
      
      <div class="form-group">
        <label>Task</label>
        <input type="text" id="taskInput" placeholder="Enter your task...">
      </div>
      
      <div class="form-group">
        <label>Category</label>
        <div class="category-input-wrapper">
          <input type="text" id="categoryInput" placeholder="e.g., school, work, personal..." list="categorySuggestions">
          <datalist id="categorySuggestions">
            <option value="school">
            <option value="work">
            <option value="personal">
            <option value="health">
            <option value="shopping">
          </datalist>
        </div>
      </div>
      
      <div class="form-group">
        <label>Deadline</label>
        <div class="deadline-inputs">
          <input type="date" id="dateInput">
          <input type="time" id="timeInput">
        </div>
      </div>
      
      <button class="save-task-btn" onclick="playClickSound(); saveTask()">Save Task</button>
    </div>
  </div>
  
  <div class="message-overlay" id="messageOverlay">
    <div class="message-box" id="messageBox"></div>
  </div>
  
  <div class="win-overlay" id="winOverlay">
    <div class="win-content">
      <h2 class="win-title">🎉 Well Done! 🎉</h2>
      <p class="win-message">Have a great day!<br>You deserve it! ✨</p>
    </div>
  </div>
  
  <canvas id="confettiCanvas"></canvas>
  <canvas id="effectsCanvas"></canvas>
  
  <script src="script.js"></script>
</body>
</html>
