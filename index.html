<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aesthetic To-Do List</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Jersey+20&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body class="landing-page">
  <div class="pixel-scene">
    <div class="sun"></div>
    <div class="mountains">
      <div class="mountain mountain-1"></div>
      <div class="mountain mountain-2"></div>
      <div class="mountain mountain-3"></div>
    </div>
    <div class="trees">
      <div class="tree tree-1"></div>
      <div class="tree tree-2"></div>
      <div class="tree tree-3"></div>
      <div class="tree tree-4"></div>
      <div class="tree tree-5"></div>
    </div>
    <div class="ground"></div>
    <div class="birds">
      <div class="bird bird-1"></div>
      <div class="bird bird-2"></div>
    </div>
    <div class="clouds">
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
    </div>
  </div>
  
  <div class="landing-content">
    <h1 class="title">Aesthetic To-Do List</h1>
    <button class="get-started-btn" onclick="window.location.href='todo.html'">Get Started</button>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
